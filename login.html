<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StoreOS</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Auth Layout ────────────────────────────────── */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-brand .logo {
      font-size: 2rem;
      color: var(--accent);
      display: block;
      margin-bottom: 0.4rem;
    }

    .auth-brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 0.3rem;
    }

    .auth-brand p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0;
    }

    .auth-divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) / 2);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }

    .btn-auth {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: calc(var(--radius) / 2);
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-auth:hover { opacity: 0.88; }
    .btn-auth:active { transform: scale(0.98); }

    .auth-mensaje {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: calc(var(--radius) / 2);
      font-size: 0.88rem;
      text-align: center;
      display: none;
    }

    .auth-mensaje.error {
      display: block;
      background: rgba(220, 60, 60, 0.12);
      border: 1px solid rgba(220, 60, 60, 0.3);
      color: #e07070;
    }

    .auth-mensaje.success {
      display: block;
      background: rgba(80, 180, 100, 0.12);
      border: 1px solid rgba(80, 180, 100, 0.3);
      color: #70c880;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="logo">⬡</span>
        <h1>StoreOS</h1>
        <p>Sistema de gestión de inventario y punto de venta</p>
      </div>

      <div class="auth-divider"></div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="usuario@storeos.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') login()">
      </div>

      <button class="btn-auth" onclick="login()">Ingresar al sistema</button>

      <p id="mensaje" class="auth-mensaje"></p>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
